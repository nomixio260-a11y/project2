name: CI

# 単一ワークフローで「テスト → デプロイ → 古い実行ログの自動削除」まで全自動。
# 起動のたびに過去の実行（本実行以外）をすべて消すので Actions タブが散らからない。

on:
  push:
    branches:
      - main
      - claude/fantasy-map-simulator-game-m6ve46
  workflow_dispatch:

permissions:
  contents: write # gh-pages へ push
  actions: write # 古い workflow run を削除

# 同一 ref の実行は最新のみ（古い実行中はキャンセル）。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Unit tests
        run: node --test tests/unit.test.js
      - name: Browser tests
        run: node --test tests/browser.test.js

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          enable_jekyll: false

  cleanup:
    name: Cleanup old runs
    needs: deploy
    if: always() # テスト/デプロイの成否に関わらず掃除する
    runs-on: ubuntu-latest
    steps:
      - name: Delete all previous workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100 }
            );
            let deleted = 0;
            for (const run of runs) {
              if (run.id === context.runId) continue; // 本実行は残す
              if (run.status !== "completed") continue; // 進行中は触らない
              try {
                await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
                deleted++;
              } catch (e) {
                core.info(`skip ${run.id}: ${e.message}`);
              }
            }
            core.info(`Deleted ${deleted} old workflow run(s).`);
