name: Deploy to GitHub Pages

# 静的サイト（HTML/JS/CSS）をそのまま GitHub Pages へ公開する。
# ビルド工程は無し（バニラJS・依存ゼロ）。

on:
  push:
    branches:
      - main
      - claude/fantasy-map-simulator-game-m6ve46
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つに制限（実行中をキャンセルしない）。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Pages 未設定でもワークフロー側で自動的に有効化する。
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリ全体を公開（index.html がルートにある）。
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
