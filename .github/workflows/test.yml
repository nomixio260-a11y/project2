name: Tests

on:
  push:
    branches:
      - main
      - claude/fantasy-map-simulator-game-m6ve46
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # ユニットテストは依存ゼロ（Node標準のみ）。
      - name: Run unit tests
        run: node --test tests/unit.test.js

  browser:
    name: Browser tests (Puppeteer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Puppeteer 同梱の Chromium をインストールして実ブラウザでテスト。
      - name: Install dependencies
        run: npm install
      - name: Run browser tests
        run: node --test tests/browser.test.js
