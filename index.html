<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fantasy Map Simulator</title>
  <!-- favicon の自動リクエスト(404)を抑止する空アイコン。 -->
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <!-- 上部バー: タイトル / 再生制御 / 季節時計 -->
  <header id="topbar" class="topbar">
    <div class="brand"><span class="brand-mark">🗺</span><span class="brand-name">Fantasy Map</span></div>
    <div class="sim-cluster">
      <button id="sim-pause" class="sim-pause" aria-pressed="false" title="再生 / 一時停止 (P)">⏸</button>
      <div class="speed-control" id="speed-control" role="group" aria-label="速度">
        <button class="speed-btn" data-speed="0.5">½×</button>
        <button class="speed-btn active" data-speed="1">1×</button>
        <button class="speed-btn" data-speed="2">2×</button>
        <button class="speed-btn" data-speed="4">4×</button>
        <button class="speed-btn" data-speed="8">8×</button>
        <button class="speed-btn" data-speed="20">20×</button>
      </div>
    </div>
    <div class="topbar-right">
      <span id="clock" class="topbar-clock">🌸 春 1年 1日</span>
      <select id="mapview" class="topbar-select" title="地図の表示区分" aria-label="地図の表示区分">
        <option value="nation">🗺 文明</option>
        <option value="diplomacy">⚔ 外交</option>
        <option value="gov">🏛 政体</option>
        <option value="religion">☽ 宗教</option>
        <option value="dynasty">👑 王朝</option>
        <option value="race">🧬 人種</option>
        <option value="language">🗣 言語</option>
        <option value="culture">🎭 文化</option>
        <option value="era">⏳ 時代</option>
      </select>
      <button id="overview-toggle" class="topbar-btn" title="世界の概観" aria-label="世界の概観">📊</button>
      <button id="settings-toggle" class="topbar-btn" title="設定" aria-label="設定">⚙</button>
    </div>
  </header>

  <!-- 世界の概観パネル（overview.js が中身を生成） -->
  <div id="overview-panel" class="overview-panel panel"></div>
  <!-- 設定パネル（settings.js が中身を生成） -->
  <div id="settings-panel" class="settings-panel panel"></div>

  <!-- モバイルでツールバーを開閉するトグル -->
  <button id="toolbar-toggle" class="toolbar-toggle" aria-label="道具">🪄</button>

  <!-- ツールバー（toolbar.js が中身を生成） -->
  <aside id="toolbar" class="toolbar panel">
    <div class="panel-head">神の力</div>
    <div id="tool-buttons" class="tool-buttons"></div>
    <div id="tool-selected" class="tool-selected"><span class="ts-dot"></span><span class="ts-name">選択中…</span></div>
    <div class="brush-control">
      <label for="brush-size">ブラシ半径 <span id="brush-size-label">5</span></label>
      <input type="range" id="brush-size" min="1" max="40" value="5">
    </div>
    <button id="regen" class="regen-btn">🌍 新しい世界</button>
    <div class="hint">
      <b>PC</b> WASD/矢印・右ドラッグで移動 · ホイールでズーム · クリックで使用<br>
      <b>スマホ</b> 1本指で移動・タップで配置 · 2本指でズーム<br>
      <b>K</b> 人間を置く（集まり国を興す） · <b>P</b> 一時停止
    </div>
  </aside>

  <!-- 右サイドバー: HUD・諸国・年代記 -->
  <div id="sidebar" class="sidebar">
    <!-- ライブ統計 HUD（hud.js が中身を生成） -->
    <div id="hud" class="hud panel"></div>
    <!-- 諸国パネル（nations.js が中身を生成） -->
    <div id="nations" class="nations panel"></div>
    <!-- 年代記パネル（chronicle.js が中身を生成） -->
    <div id="chronicle" class="nations chronicle panel"></div>
  </div>

  <!-- インスペクタ（inspector.js が中身を生成。調べるツールで人/国を選択） -->
  <div id="inspector" class="inspector panel"></div>

  <!-- 地図ビューの凡例（mapview.js が中身を生成。区分ビュー選択時に表示） -->
  <div id="mapview-legend" class="mapview-legend"></div>

  <!-- ミニマップ（minimap.js が描画） -->
  <canvas id="minimap" class="minimap" width="168" height="168"></canvas>

  <!-- ヘルプ＆凡例 -->
  <button id="help-toggle" class="help-toggle" aria-label="ヘルプ">?</button>
  <div id="help-overlay" class="help-overlay"></div>

  <div id="coords" class="coords"></div>

  <!-- イベント通知トースト（toasts.js が生成） -->
  <div id="toasts" class="toasts"></div>

  <!-- 依存順にロード（no-build: クラシック script のみ） -->
  <script src="js/core/namespace.js"></script>
  <script src="js/core/constants.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/math/noise.js"></script>
  <script src="js/world/tile.js"></script>
  <script src="js/world/world.js"></script>
  <script src="js/world/worldgen.js"></script>
  <script src="js/world/entities.js"></script>
  <script src="js/render/camera.js"></script>
  <script src="js/render/sprites.js"></script>
  <script src="js/render/renderer.js"></script>
  <script src="js/tools/brush.js"></script>
  <script src="js/tools/godpowers.js"></script>
  <script src="js/input/input.js"></script>
  <script src="js/ui/toolbar.js"></script>
  <script src="js/ui/hud.js"></script>
  <script src="js/ui/minimap.js"></script>
  <script src="js/ui/nations.js"></script>
  <script src="js/ui/chronicle.js"></script>
  <script src="js/ui/inspector.js"></script>
  <script src="js/ui/settings.js"></script>
  <script src="js/ui/overview.js"></script>
  <script src="js/ui/mapview.js"></script>
  <script src="js/ui/toasts.js"></script>
  <script src="js/ui/persistence.js"></script>
  <script src="js/ui/help.js"></script>
  <script src="js/engine/engine.js"></script>
  <!-- シミュレーションシステム（engine の後、main の前） -->
  <script src="js/systems/climate.js"></script>
  <script src="js/systems/weather.js"></script>
  <script src="js/systems/vegetation.js"></script>
  <script src="js/systems/creatures.js"></script>
  <script src="js/systems/fire.js"></script>
  <script src="js/systems/civ.js"></script>
  <script src="js/systems/disasters.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
